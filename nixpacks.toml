# nixpacks.toml
#
# Railway builds this repo using Nixpacks. By default, the build
# container does NOT include the system libraries Chromium needs to
# RUN (libnss3, libatk, libgbm, fonts, etc.) even after Puppeteer's
# own Chromium binary is installed via `npx puppeteer browsers
# install chrome` (see package.json build script). Without these
# shared libraries present in the container, Chromium fails to
# launch with missing .so file errors.
#
# This does NOT try to point Puppeteer at a Nix-provided Chromium
# binary directly (that approach is fragile — Nix store paths are
# versioned/hashed and not reliably guessable, and Nixpacks env var
# propagation into [phases.setup] is not consistently honoured).
# Instead, Puppeteer installs and uses its OWN bundled Chromium
# (see package.json "postinstall" script), and this file just makes
# sure the OS-level shared libraries that binary depends on exist.

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "nss",
  "atk",
  "at-spi2-atk",
  "cups",
  "dbus",
  "expat",
  "fontconfig",
  "freetype",
  "gtk3",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "pango",
  "cairo",
  "alsa-lib",
  "glib",
  "nspr",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
]
